<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ngô Quốc Vượng – Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0e1a; --card: #161d2e;
      --accent: #38bdf8; --accent2: #818cf8; --gold: #fbbf24;
      --text: #e2e8f0; --muted: #94a3b8; --border: rgba(56,189,248,0.15);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    .bg-grid { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(56,189,248,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(56,189,248,0.04) 1px, transparent 1px); background-size: 40px 40px; }
    .bg-glow { position: fixed; z-index: 0; width: 600px; height: 600px; border-radius: 50%; filter: blur(120px); opacity: 0.18; }
    .bg-glow-1 { top: -200px; left: -200px; background: var(--accent); }
    .bg-glow-2 { bottom: -200px; right: -200px; background: var(--accent2); }
    .wrapper { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 60px 24px 80px; display: flex; flex-direction: column; gap: 32px; }

    /* HERO - layout dọc, ảnh to chính giữa trên cùng */
    .hero { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 48px 40px 40px; display: flex; flex-direction: column; align-items: center; gap: 28px; box-shadow: 0 0 60px rgba(56,189,248,0.06); animation: fadeUp 0.7s ease both; }

    .avatar-ring { width: 200px; height: 200px; border-radius: 20px; padding: 3px; background: linear-gradient(135deg, var(--accent), var(--accent2), var(--gold)); animation: spin-ring 8s linear infinite; flex-shrink: 0; }
    @keyframes spin-ring { to { filter: hue-rotate(360deg); } }
    .avatar-inner { width: 100%; height: 100%; border-radius: 18px; overflow: hidden; border: 3px solid var(--bg); }
    .avatar-inner img { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; display: block; }

    .hero-text { text-align: center; }
    .tag { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); border: 1px solid rgba(56,189,248,0.4); border-radius: 999px; padding: 3px 12px; margin-bottom: 12px; }
    h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 900; line-height: 1.1; background: linear-gradient(90deg, #e2e8f0, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; }
    .subtitle { font-style: italic; font-family: 'Playfair Display', serif; color: var(--muted); font-size: 15px; }

    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; animation: fadeUp 0.7s 0.15s ease both; }
    .info-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px 24px 20px; display: flex; flex-direction: column; gap: 8px; transition: transform 0.2s, box-shadow 0.2s; }
    .info-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(56,189,248,0.1); }
    .info-icon { font-size: 24px; width: 44px; height: 44px; background: rgba(56,189,248,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .info-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
    .info-value { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; }

    .contact-card { background: linear-gradient(135deg, rgba(56,189,248,0.08), rgba(129,140,248,0.08)); border: 1px solid var(--border); border-radius: 16px; padding: 28px 32px; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; animation: fadeUp 0.7s 0.3s ease both; }
    .contact-card .label { font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .phone { font-size: 26px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
    .call-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #0a0e1a; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 700; font-size: 14px; padding: 12px 24px; border-radius: 12px; text-decoration: none; transition: opacity 0.2s, transform 0.2s; }
    .call-btn:hover { opacity: 0.85; transform: scale(1.03); }

    footer { text-align: center; font-size: 12px; color: var(--muted); animation: fadeUp 0.7s 0.45s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) { .contact-card { flex-direction: column; text-align: center; } }
  </style>
</head>
